name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: gitea.big.netlobo.com
  IMAGE_NAME: netlobo/nomad-gateway
  JOB_NAME: nomad-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Deploy to Nomad
        if: github.ref == 'refs/heads/main'
        run: |
          curl -sf -X PUT \
            -H "X-Nomad-Token: ${{ secrets.NOMAD_TOKEN }}" \
            "${{ secrets.NOMAD_ADDR }}/v1/var/nomad/jobs/${{ env.JOB_NAME }}" \
            -H "Content-Type: application/json" \
            -d '{"Namespace":"default","Path":"nomad/jobs/${{ env.JOB_NAME }}","Items":{"image_digest":"${{ steps.version.outputs.version }}-${{ github.sha }}"}}'
